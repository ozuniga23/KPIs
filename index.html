<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Archivo', Arial, sans-serif;
      color: #fff;
    }

    #screen {
      position: relative;
      width: 1920px;
      height: 1080px;
      margin: 0 auto;
      background: #000;
      overflow: hidden;
    }

    .chart {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s linear;
      -webkit-transition: opacity 0.4s linear;
      box-sizing: border-box;
      padding: 24px 58px 32px 58px;
    }

    .chart.visible {
      opacity: 1;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 88px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 10px;
      text-align: center;
      color: #b8b8b8;
      font-size: 56px;
      line-height: 1;
      font-weight: 700;
    }

    .rows {
      position: absolute;
      left: 58px;
      right: 58px;
      top: 185px;
      bottom: 120px;
      overflow: hidden;
    }

    .row {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      white-space: nowrap;
      font-size: 0;
    }

    .name,
    .bar-zone,
    .value {
      display: inline-block;
      vertical-align: middle;
      box-sizing: border-box;
    }

    .name {
      width: 210px;
      padding-right: 14px;
      color: #f1f1f1;
      font-weight: 700;
      font-size: 54px;
      text-align: right;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-zone {
      width: 1400px;
      height: 56px;
      position: relative;
    }

    .bar {
      height: 100%;
      width: 0;
      border-radius: 0 2px 2px 0;
      transition: width 8s cubic-bezier(0.2, 0.9, 0.25, 1);
      -webkit-transition: width 8s cubic-bezier(0.2, 0.9, 0.25, 1);
    }

    .value {
      width: 190px;
      padding-left: 16px;
      font-size: 58px;
      font-weight: 700;
      text-align: left;
      opacity: 0;
      transform: scale(0.6);
      -webkit-transform: scale(0.6);
      transition: transform 0.22s ease-out, opacity 0.22s ease-out;
      -webkit-transition: -webkit-transform 0.22s ease-out, opacity 0.22s ease-out;
    }

    .value.show {
      opacity: 1;
      transform: scale(1);
      -webkit-transform: scale(1);
    }

    .axis {
      position: absolute;
      left: 268px;
      right: 58px;
      bottom: 58px;
      height: 45px;
      border-top: 2px solid #808080;
    }

    .tick {
      position: absolute;
      top: -2px;
      width: 0;
      height: 12px;
      border-left: 2px solid #808080;
    }

    .tick-label {
      position: absolute;
      top: 8px;
      margin-left: -24px;
      width: 48px;
      text-align: center;
      color: #e7e7e7;
      font-size: 42px;
      font-weight: 700;
    }

    .last-updated {
      position: absolute;
      right: 24px;
      bottom: 12px;
      color: #8c8c8c;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .error {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      display: none;
      box-sizing: border-box;
      padding-top: 470px;
      text-align: center;
      color: #f44747;
      font-size: 44px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="screen">
    <div id="chart1" class="chart"></div>
    <div id="chart2" class="chart"></div>
    <div id="error" class="error">Unable to load data.json</div>
  </div>

  <script>
    (function () {
      function byValueDesc(a, b) {
        return b.value - a.value;
      }

      function clamp01(v) {
        if (v < 0) { return 0; }
        if (v > 1) { return 1; }
        return v;
      }

      function lerp(a, b, t) {
        return Math.round(a + (b - a) * t);
      }

      function colorHexToRgb(hex) {
        var h = hex.replace('#', '');
        return {
          r: parseInt(h.substring(0, 2), 16),
          g: parseInt(h.substring(2, 4), 16),
          b: parseInt(h.substring(4, 6), 16)
        };
      }

      function colorRgbToHex(r, g, b) {
        function two(n) {
          var s = n.toString(16);
          return s.length < 2 ? '0' + s : s;
        }
        return '#' + two(r) + two(g) + two(b);
      }

      function gradientColor(stops, t) {
        var p = clamp01(t);
        if (stops.length === 1) {
          return stops[0];
        }
        var seg = (stops.length - 1) * p;
        var i = Math.floor(seg);
        if (i >= stops.length - 1) {
          i = stops.length - 2;
        }
        var local = seg - i;
        var c1 = colorHexToRgb(stops[i]);
        var c2 = colorHexToRgb(stops[i + 1]);
        return colorRgbToHex(
          lerp(c1.r, c2.r, local),
          lerp(c1.g, c2.g, local),
          lerp(c1.b, c2.b, local)
        );
      }

      function niceStep(maxValue) {
        var rough = maxValue / 5;
        if (rough <= 0) { return 1; }
        var exp = Math.pow(10, Math.floor(Math.log(rough) / Math.log(10)));
        var f = rough / exp;
        var nice;
        if (f <= 1) {
          nice = 1;
        } else if (f <= 2) {
          nice = 2;
        } else if (f <= 5) {
          nice = 5;
        } else {
          nice = 10;
        }
        return nice * exp;
      }

      function createEl(tag, className, text) {
        var el = document.createElement(tag);
        if (className) {
          el.className = className;
        }
        if (typeof text === 'string') {
          el.appendChild(document.createTextNode(text));
        }
        return el;
      }

      function scaleChartTypography(count, chartEl) {
        var minCount = 10;
        var maxCount = 20;
        var c = count;
        if (c < minCount) { c = minCount; }
        if (c > maxCount) { c = maxCount; }
        var t = (c - minCount) / (maxCount - minCount);
        var nameSize = Math.round(54 - 20 * t);
        var valueSize = Math.round(58 - 22 * t);
        var barHeight = Math.round(56 - 24 * t);
        var rowGap = Math.round(12 - 6 * t);

        var style = createEl('style', '', '');
        style.type = 'text/css';
        style.appendChild(document.createTextNode(
          '#' + chartEl.id + ' .name{font-size:' + nameSize + 'px;}' +
          '#' + chartEl.id + ' .value{font-size:' + valueSize + 'px;}' +
          '#' + chartEl.id + ' .bar-zone{height:' + barHeight + 'px;}' +
          '#' + chartEl.id + ' .row{margin-bottom:' + rowGap + 'px;}'
        ));
        document.getElementsByTagName('head')[0].appendChild(style);
      }

      function renderChart(chartEl, options) {
        var data = options.data.slice(0);
        data.sort(byValueDesc);

        scaleChartTypography(data.length, chartEl);

        var maxValue = 1;
        var i;
        for (i = 0; i < data.length; i++) {
          if (data[i].value > maxValue) {
            maxValue = data[i].value;
          }
        }

        var step = niceStep(maxValue);
        var axisMax = Math.ceil(maxValue / step) * step;

        chartEl.innerHTML = '';

        var title = createEl('h1', 'title', options.title);
        var subtitle = createEl('div', 'subtitle', options.subtitlePrefix + options.asOf);
        var rows = createEl('div', 'rows', '');
        var axis = createEl('div', 'axis', '');
        var updated = createEl('div', 'last-updated', 'Last updated: ' + options.asOf);

        chartEl.appendChild(title);
        chartEl.appendChild(subtitle);
        chartEl.appendChild(rows);
        chartEl.appendChild(axis);
        chartEl.appendChild(updated);

        var bars = [];
        var values = [];

        for (i = 0; i < data.length; i++) {
          var row = createEl('div', 'row', '');
          var name = createEl('div', 'name', data[i].name);
          var barZone = createEl('div', 'bar-zone', '');
          var bar = createEl('div', 'bar', '');
          var value = createEl('div', 'value', String(data[i].value));

          bar.style.backgroundColor = gradientColor(options.gradientStops, data.length <= 1 ? 0 : i / (data.length - 1));
          bar.setAttribute('data-target', String((data[i].value / axisMax) * 100));

          barZone.appendChild(bar);
          row.appendChild(name);
          row.appendChild(barZone);
          row.appendChild(value);
          rows.appendChild(row);

          bars.push(bar);
          values.push(value);
        }

        var tick;
        var tickLabel;
        for (i = 0; i <= axisMax; i += step) {
          tick = createEl('div', 'tick', '');
          tickLabel = createEl('div', 'tick-label', String(i));
          tick.style.left = (i / axisMax * 100) + '%';
          tickLabel.style.left = (i / axisMax * 100) + '%';
          axis.appendChild(tick);
          axis.appendChild(tickLabel);
        }

        return {
          chartEl: chartEl,
          bars: bars,
          values: values
        };
      }

      function startChart(playObj, fadeOutAtEnd) {
        var i;
        var chartEl = playObj.chartEl;
        chartEl.className = 'chart visible';

        setTimeout(function () {
          for (i = 0; i < playObj.bars.length; i++) {
            playObj.bars[i].style.width = playObj.bars[i].getAttribute('data-target') + '%';
          }
        }, 30);

        setTimeout(function () {
          var total = playObj.values.length;
          var stagger = total > 1 ? 1500 / (total - 1) : 0;

          for (i = 0; i < total; i++) {
            (function (idx) {
              setTimeout(function () {
                playObj.values[idx].className = 'value show';
              }, Math.round(stagger * idx));
            }(i));
          }
        }, 8000);

        if (fadeOutAtEnd) {
          setTimeout(function () {
            chartEl.className = 'chart';
          }, 19600);
        }
      }

      function loadDataAndStart() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'data.json', true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) {
            return;
          }

          if (xhr.status === 200 || xhr.status === 0) {
            try {
              var data = JSON.parse(xhr.responseText);
              var asOf = data.asOf || '';

              var chart1 = renderChart(document.getElementById('chart1'), {
                title: 'Active Work Orders',
                subtitlePrefix: 'As of ',
                asOf: asOf,
                data: data.active || [],
                gradientStops: ['#ea0028', '#ff4f1a', '#f0d70f', '#9fd44a']
              });

              var chart2 = renderChart(document.getElementById('chart2'), {
                title: 'Completed Work Orders',
                subtitlePrefix: 'MTD • As of ',
                asOf: asOf,
                data: data.completedMTD || [],
                gradientStops: ['#008f39', '#2fa63a', '#77bf34', '#b2d74a']
              });

              startChart(chart1, true);
              setTimeout(function () {
                startChart(chart2, false);
              }, 20000);
            } catch (e) {
              document.getElementById('error').style.display = 'block';
            }
          } else {
            document.getElementById('error').style.display = 'block';
          }
        };
        xhr.send();
      }

      loadDataAndStart();
    }());
  </script>
</body>
</html>
